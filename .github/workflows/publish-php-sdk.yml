name: Publish PHP SDK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-php-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish pantree/pantree-php
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Bump patch version in composer.json
        run: |
          php -r '
          $path = "composer.json";
          $json = json_decode(file_get_contents($path), true);
          if (!is_array($json)) {
              fwrite(STDERR, "Invalid composer.json\n");
              exit(1);
          }
          $current = $json["version"] ?? "0.0.0";
          if (!preg_match("/^\d+\.\d+\.\d+$/", $current)) {
              fwrite(STDERR, "version must be semver (x.y.z), got: {$current}\n");
              exit(1);
          }
          [$major, $minor, $patch] = array_map("intval", explode(".", $current));
          $next = "{$major}.{$minor}." . ($patch + 1);
          $json["version"] = $next;
          $encoded = json_encode($json, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . PHP_EOL;
          file_put_contents($path, $encoded);
          file_put_contents(getenv("GITHUB_ENV"), "SDK_VERSION={$next}\n", FILE_APPEND);
          echo "Bumped composer.json version: {$current} -> {$next}\n";
          '

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.json
          git commit -m "chore: bump php sdk version to v${SDK_VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag "v${SDK_VERSION}"
          git push origin "v${SDK_VERSION}"

      - name: Notify Packagist (optional)
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "PACKAGIST_USERNAME or PACKAGIST_TOKEN missing; skipping Packagist notify."
            exit 0
          fi
          curl --fail-with-body -X POST \
            -H "content-type:application/json" \
            -d "{\"repository\":{\"url\":\"https://github.com/${{ github.repository }}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}"
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
