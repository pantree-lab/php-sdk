<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pantree — Browser Example</title>
</head>
<body>
  <button id="crash">Trigger error</button>

  <script type="module">
    import Pantree from "https://esm.sh/@pantree/js@1.1.0";

    Pantree.init({
      dsn:         "https://API_KEY:INGEST_SECRET@your-pantree.com/api/ingest",
      environment: "production",
      debug:       true,
    });

    // Capture unhandled errors
    window.addEventListener("error", (e) => {
      Pantree.captureException(e.error ?? new Error(e.message));
    });

    // Capture unhandled promise rejections
    window.addEventListener("unhandledrejection", (e) => {
      Pantree.captureException(
        e.reason instanceof Error ? e.reason : new Error(String(e.reason)),
      );
    });

    // Manual capture
    document.getElementById("crash").addEventListener("click", () => {
      Pantree.captureMessage("Button clicked", { level: "info" });
      throw new Error("Demo error from browser");
    });
  </script>
</body>
</html>
